<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}
  #pg{display:flex;flex-direction:column;align-items:center;padding:16px 0 20px;font-family:'Orbitron',monospace}
  #title{font-size:11px;letter-spacing:6px;color:#333;text-transform:uppercase;margin-bottom:8px}
  #scoreboard{display:flex;gap:48px;margin-bottom:12px;align-items:center}
  .score{font-size:36px;font-weight:900;font-family:'Orbitron',monospace;line-height:1}
  #score-l{color:#00f5ff;text-shadow:0 0 20px #00f5ff88}
  #score-r{color:#ff2d78;text-shadow:0 0 20px #ff2d7888}
  #divider{width:1px;height:40px;background:linear-gradient(to bottom,transparent,#444,transparent)}
  #arena{position:relative;width:600px;height:360px;border:1px solid #1a1a1a;overflow:hidden;cursor:none}
  #cv{display:block;width:600px;height:360px}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000c}
  #msg{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#fff;letter-spacing:3px;text-align:center;line-height:1.5}
  #sub{font-family:'Orbitron',monospace;font-size:10px;color:#555;letter-spacing:4px;text-align:center}
  #start-btn{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;padding:10px 28px;background:transparent;border:1px solid #00f5ff44;color:#00f5ff;cursor:pointer;transition:all .2s;text-transform:uppercase}
  #start-btn:hover{background:#00f5ff18;border-color:#00f5ff;box-shadow:0 0 16px #00f5ff44}
  #controls-hint{display:flex;gap:32px;margin-top:10px}
  .hint{display:flex;flex-direction:column;align-items:center;gap:4px}
  .hint-label{font-size:9px;letter-spacing:3px;color:#333}
  .hint-keys{display:flex;gap:4px}
  .key{font-family:'Orbitron',monospace;font-size:10px;color:#555;border:1px solid #222;padding:3px 8px;border-radius:3px}
</style>
</head>
<body>
<div id="pg">
  <div id="title">Pong</div>
  <div id="scoreboard">
    <div class="score" id="score-l">0</div>
    <div id="divider"></div>
    <div class="score" id="score-r">0</div>
  </div>
  <div id="arena">
    <canvas id="cv" width="600" height="360"></canvas>
    <div id="overlay">
      <div id="msg">PONG</div>
      <div id="sub">First to 7 wins</div>
      <button id="start-btn" onclick="startGame()">Start Game</button>
    </div>
  </div>
  <div id="controls-hint">
    <div class="hint">
      <div class="hint-label">You</div>
      <div class="hint-keys"><span class="key">W</span><span class="key">S</span></div>
    </div>
    <div class="hint">
      <div class="hint-label">AI opponent</div>
      <div class="hint-keys"><span class="key">Auto</span></div>
    </div>
  </div>
</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const W=600,H=360,PW=10,PH=64,BALL=7,WIN=7;
const overlay=document.getElementById('overlay');
const msg=document.getElementById('msg');
const sub=document.getElementById('sub');
const sbL=document.getElementById('score-l');
const sbR=document.getElementById('score-r');

let state='idle';
let score={l:0,r:0};
let keys={};
let raf;

let lp={y:H/2-PH/2,vy:0};
let rp={y:H/2-PH/2,vy:0};
let ball={x:W/2,y:H/2,vx:4,vy:3};
let trail=[];
let particles=[];
let flashTimer=0;
let flashSide='';

function resetBall(dir){
  ball.x=W/2;ball.y=H/2;
  const angle=(Math.random()-.5)*0.8;
  const spd=4.5;
  ball.vx=dir*spd*Math.cos(angle);
  ball.vy=spd*Math.sin(angle);
  trail=[];
}

function spawnParticles(x,y,color){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2;
    const spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color});
  }
}

function aiMove(){
  const speed=3.6;
  const target=ball.y-PH/2+(Math.random()-.5)*12;
  if(rp.y<target-2) rp.y=Math.min(rp.y+speed,target);
  else if(rp.y>target+2) rp.y=Math.max(rp.y-speed,target);
  rp.y=Math.max(0,Math.min(H-PH,rp.y));
}

function update(){
  if(state!=='playing') return;
  const ps=6;
  if(keys['w']||keys['W']||keys['ArrowUp']) lp.y=Math.max(0,lp.y-ps);
  if(keys['s']||keys['S']||keys['ArrowDown']) lp.y=Math.min(H-PH,lp.y+ps);
  aiMove();
  trail.push({x:ball.x,y:ball.y});
  if(trail.length>14) trail.shift();
  ball.x+=ball.vx; ball.y+=ball.vy;
  if(ball.y-BALL<0){ball.y=BALL;ball.vy*=-1;}
  if(ball.y+BALL>H){ball.y=H-BALL;ball.vy*=-1;}
  const hitL=ball.x-BALL<20+PW && ball.y>lp.y && ball.y<lp.y+PH && ball.vx<0;
  const hitR=ball.x+BALL>W-20-PW && ball.y>rp.y && ball.y<rp.y+PH && ball.vx>0;
  if(hitL){
    ball.vx=Math.abs(ball.vx)*1.06;
    const rel=(ball.y-(lp.y+PH/2))/(PH/2);
    ball.vy=rel*5;
    ball.x=20+PW+BALL;
    spawnParticles(ball.x,ball.y,'#00f5ff');
    flashSide='l';flashTimer=8;
  }
  if(hitR){
    ball.vx=-Math.abs(ball.vx)*1.06;
    const rel=(ball.y-(rp.y+PH/2))/(PH/2);
    ball.vy=rel*5;
    ball.x=W-20-PW-BALL;
    spawnParticles(ball.x,ball.y,'#ff2d78');
    flashSide='r';flashTimer=8;
  }
  const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  if(spd>12){ball.vx=ball.vx/spd*12;ball.vy=ball.vy/spd*12;}
  if(ball.x<0){
    score.r++;sbR.textContent=score.r;
    spawnParticles(20,ball.y,'#ff2d78');
    if(score.r>=WIN) return endGame('r');
    resetBall(1);
  }
  if(ball.x>W){
    score.l++;sbL.textContent=score.l;
    spawnParticles(W-20,ball.y,'#00f5ff');
    if(score.l>=WIN) return endGame('l');
    resetBall(-1);
  }
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.04;p.vx*=0.92;});
  particles=particles.filter(p=>p.life>0);
  if(flashTimer>0) flashTimer--;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([6,10]);ctx.strokeStyle='#111';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2,.5);ctx.lineTo(W/2,H-.5);ctx.stroke();
  ctx.setLineDash([]);
  for(let i=0;i<trail.length;i++){
    const t=i/trail.length;
    ctx.beginPath();
    ctx.arc(trail[i].x,trail[i].y,BALL*t*0.85,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${t*0.18})`;
    ctx.fill();
  }
  const gL=ctx.createLinearGradient(20,lp.y,20+PW,lp.y+PH);
  gL.addColorStop(0,'#00f5ff');gL.addColorStop(1,'#0088aa');
  ctx.fillStyle=gL;
  ctx.shadowColor='#00f5ff';ctx.shadowBlur=flashSide==='l'&&flashTimer>0?24:10;
  ctx.fillRect(20,lp.y,PW,PH);
  const gR=ctx.createLinearGradient(W-20-PW,rp.y,W-20,rp.y+PH);
  gR.addColorStop(0,'#ff2d78');gR.addColorStop(1,'#aa0044');
  ctx.fillStyle=gR;
  ctx.shadowColor='#ff2d78';ctx.shadowBlur=flashSide==='r'&&flashTimer>0?24:10;
  ctx.fillRect(W-20-PW,rp.y,PW,PH);
  ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(ball.x,ball.y,BALL,0,Math.PI*2);
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(255,255,255,0.8)';ctx.shadowBlur=14;
  ctx.fill();ctx.shadowBlur=0;
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color+(Math.floor(p.life*255).toString(16).padStart(2,'0'));
    ctx.fill();
  });
}

function loop(){
  update();draw();
  raf=requestAnimationFrame(loop);
}

function startGame(){
  score={l:0,r:0};sbL.textContent='0';sbR.textContent='0';
  lp={y:H/2-PH/2};rp={y:H/2-PH/2};
  particles=[];trail=[];
  state='playing';
  overlay.style.display='none';
  resetBall(Math.random()<.5?1:-1);
  if(raf) cancelAnimationFrame(raf);
  loop();
}

function endGame(winner){
  state='over';
  const w=winner==='l'?'YOU WIN':'CPU WINS';
  msg.innerHTML=w;
  sub.textContent=`${score.l} — ${score.r}`;
  const btn=document.getElementById('start-btn');
  btn.textContent='Play Again';
  overlay.style.display='flex';
}

document.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  const scaleY=H/rect.height;
  const my=(e.clientY-rect.top)*scaleY;
  lp.y=Math.max(0,Math.min(H-PH,my-PH/2));
});

loop();
</script>
</body>
</html>
