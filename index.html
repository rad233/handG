<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong Pro Clean</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:Arial}
#wrap{text-align:center;color:#fff}
canvas{border:1px solid #222}
</style>
</head>
<body>

<div id="wrap">
  <h2>PONG PRO</h2>
  <p>W/S = Move | ↑ ↓ = 2P | T = Theme | M = Toggle Mode</p>
  <canvas id="cv" width="600" height="360"></canvas>
  <h3 id="score">0 : 0</h3>
</div>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

let mode="ai";
let theme="neon";

let ball={x:300,y:180,vx:4,vy:3};
let p1={y:150}, p2={y:150};
let score1=0, score2=0;
let keys={};

let particles=[];

// lightweight sound
const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

function playHit(){
  hitSound.currentTime=0;
  hitSound.play();
}

function spawnParticles(x,y,color){
  if(particles.length>80) return;
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({
      x,y,
      vx:Math.cos(a)*2,
      vy:Math.sin(a)*2,
      life:1,
      color
    });
  }
}

function reset(dir){
  ball.x=300; ball.y=180;
  ball.vx=dir*4;
  ball.vy=(Math.random()*4-2);
}

function aiMove(){
  let target=ball.y-30;
  p2.y += (target-p2.y)*0.08;
}

function update(){
  ball.x+=ball.vx;
  ball.y+=ball.vy;

  if(ball.y<0||ball.y>360) ball.vy*=-1;

  if(keys["w"]) p1.y-=6;
  if(keys["s"]) p1.y+=6;

  if(mode==="2p"){
    if(keys["ArrowUp"]) p2.y-=6;
    if(keys["ArrowDown"]) p2.y+=6;
  } else {
    aiMove();
  }

  // collision
  if(ball.x<20 && ball.y>p1.y && ball.y<p1.y+60){
    ball.vx*=-1; playHit(); spawnParticles(ball.x,ball.y,"#0ff");
  }

  if(ball.x>580 && ball.y>p2.y && ball.y<p2.y+60){
    ball.vx*=-1; playHit(); spawnParticles(ball.x,ball.y,"#f0f");
  }

  // scoring
  if(ball.x<0){score2++; reset(1);}
  if(ball.x>600){score1++; reset(-1);}

  document.getElementById("score").textContent=score1+" : "+score2;

  // particles
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life-=0.05;
  });
  particles=particles.filter(p=>p.life>0);
}

function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,600,360);

  let c1=theme==="neon"?"#0ff":"#0f0";
  let c2=theme==="neon"?"#f0f":"#f00";

  ctx.fillStyle=c1;
  ctx.fillRect(10,p1.y,10,60);

  ctx.fillStyle=c2;
  ctx.fillRect(580,p2.y,10,60);

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,7,0,Math.PI*2);
  ctx.fill();

  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life;
    ctx.fillRect(p.x,p.y,3,3);
    ctx.globalAlpha=1;
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// controls
document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(e.key==="m") mode = mode==="ai" ? "2p" : "ai";
  if(e.key==="t") theme = theme==="neon" ? "retro" : "neon";
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// mouse control
cv.addEventListener("mousemove",e=>{
  let rect=cv.getBoundingClientRect();
  p1.y=e.clientY-rect.top-30;
});

loop();
</script>

</body>
</html>
