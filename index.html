<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong Game</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: auto;
      background: #000;
    }
  </style>
</head>
<body>

<canvas id="pong" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("pong");
const ctx = canvas.getContext("2d");

// Paddle settings
const paddleWidth = 10, paddleHeight = 100;

// Left paddle
const left = {
  x: 0,
  y: canvas.height / 2 - paddleHeight / 2,
  score: 0
};

// Right paddle
const right = {
  x: canvas.width - paddleWidth,
  y: canvas.height / 2 - paddleHeight / 2,
  score: 0
};

// Ball
const ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 10,
  speed: 5,
  velocityX: 5,
  velocityY: 5
};

// Draw rectangle
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// Draw circle
function drawCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.closePath();
  ctx.fill();
}

// Draw text
function drawText(text, x, y) {
  ctx.fillStyle = "#fff";
  ctx.font = "40px Arial";
  ctx.fillText(text, x, y);
}

// Draw net
function drawNet() {
  for (let i = 0; i < canvas.height; i += 15) {
    drawRect(canvas.width/2 - 1, i, 2, 10, "white");
  }
}

// Reset ball
function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.velocityX = -ball.velocityX;
  ball.speed = 5;
}

// Collision detection
function collision(b, p) {
  return b.x < p.x + paddleWidth &&
         b.x + b.radius > p.x &&
         b.y < p.y + paddleHeight &&
         b.y + b.radius > p.y;
}

// Update game
function update() {
  ball.x += ball.velocityX;
  ball.y += ball.velocityY;

  // Wall collision
  if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
    ball.velocityY = -ball.velocityY;
  }

  // Paddle collision
  let player = (ball.x < canvas.width / 2) ? left : right;

  if (collision(ball, player)) {
    let collidePoint = (ball.y - (player.y + paddleHeight/2)) / (paddleHeight/2);
    let angle = collidePoint * Math.PI/4;

    let direction = (ball.x < canvas.width/2) ? 1 : -1;

    ball.velocityX = direction * ball.speed * Math.cos(angle);
    ball.velocityY = ball.speed * Math.sin(angle);

    ball.speed += 0.9;
  }

  // Score
  if (ball.x - ball.radius < 0) {
    right.score++;
    resetBall();
  } else if (ball.x + ball.radius > canvas.width) {
    left.score++;
    resetBall();
  }
}

// Draw everything
function render() {
  drawRect(0, 0, canvas.width, canvas.height, "#000");
  drawNet();

  drawText(left.score, canvas.width/4, 50);
  drawText(right.score, 3*canvas.width/4, 50);

  drawRect(left.x, left.y, paddleWidth, paddleHeight, "#fff");
  drawRect(right.x, right.y, paddleWidth, paddleHeight, "#fff");

  drawCircle(ball.x, ball.y, ball.radius, "#fff");
}

// Game loop
function game() {
  update();
  render();
}

setInterval(game, 1000/60);

// Controls
document.addEventListener("keydown", function(e) {
  switch(e.key) {
    case "w":
      left.y -= 30;
      break;
    case "s":
      left.y += 30;
      break;
    case "ArrowUp":
      right.y -= 30;
      break;
    case "ArrowDown":
      right.y += 30;
      break;
  }
});
</script>

</body>
</html>
