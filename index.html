<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
#menu{text-align:center}
button{padding:10px 20px;margin:5px;cursor:pointer}
canvas{background:#000;border:2px solid #333;display:none}
</style>
</head>
<body>

<div id="menu">
  <h1>PONG PRO</h1>
  <p>Mode:</p>
  <button onclick="mode='ai'">VS AI</button>
  <button onclick="mode='2p'">2 Player</button>

  <p>Difficulty:</p>
  <button onclick="difficulty=2">Easy</button>
  <button onclick="difficulty=4">Medium</button>
  <button onclick="difficulty=6">Hard</button>

  <p>Theme:</p>
  <button onclick="theme='neon'">Neon</button>
  <button onclick="theme='retro'">Retro</button>

  <br><br>
  <button onclick="start()">Start Game</button>
</div>

<canvas id="game" width="600" height="360"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let mode="ai";
let difficulty=4;
let theme="neon";

let ball={x:300,y:180,vx:4,vy:3};
let p1={y:150}, p2={y:150};
let score1=0, score2=0;

let keys={};

const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const scoreSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const winSound=new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_drum_hit.ogg");

function start(){
  document.getElementById("menu").style.display="none";
  c.style.display="block";
  loop();
}

function reset(dir){
  ball.x=300; ball.y=180;
  ball.vx=dir*4; ball.vy=(Math.random()*4-2);
}

function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,600,360);

  // theme colors
  let c1=theme==="neon"?"#0ff":"#0f0";
  let c2=theme==="neon"?"#f0f":"#f00";

  ctx.fillStyle=c1;
  ctx.fillRect(10,p1.y,10,60);

  ctx.fillStyle=c2;
  ctx.fillRect(580,p2.y,10,60);

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,7,0,Math.PI*2);
  ctx.fill();

  ctx.fillText(score1,250,30);
  ctx.fillText(score2,330,30);
}

function update(){
  ball.x+=ball.vx;
  ball.y+=ball.vy;

  if(ball.y<0||ball.y>360) ball.vy*=-1;

  // player 1
  if(keys["w"]) p1.y-=6;
  if(keys["s"]) p1.y+=6;

  // player 2 or AI
  if(mode==="2p"){
    if(keys["ArrowUp"]) p2.y-=6;
    if(keys["ArrowDown"]) p2.y+=6;
  } else {
    // smarter AI (predict)
    let target=ball.y - 30;
    if(p2.y<target) p2.y+=difficulty;
    else p2.y-=difficulty;
  }

  // collisions
  if(ball.x<20 && ball.y>p1.y && ball.y<p1.y+60){
    ball.vx*=-1; hitSound.play();
  }
  if(ball.x>580 && ball.y>p2.y && ball.y<p2.y+60){
    ball.vx*=-1; hitSound.play();
  }

  // scoring
  if(ball.x<0){
    score2++; scoreSound.play(); reset(1);
  }
  if(ball.x>600){
    score1++; scoreSound.play(); reset(-1);
  }

  // win
  if(score1===7||score2===7){
    winSound.play();
    alert(score1===7?"Player 1 Wins!":"Player 2 Wins!");
    location.reload();
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// controls
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// touch / mouse
c.addEventListener("mousemove",e=>{
  let rect=c.getBoundingClientRect();
  p1.y=e.clientY-rect.top-30;
});

c.addEventListener("touchmove",e=>{
  let rect=c.getBoundingClientRect();
  p1.y=e.touches[0].clientY-rect.top-30;
});

</script>
</body>
</html>
